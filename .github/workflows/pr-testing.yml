name: PR - Full Testing

# Runs on pull requests targeting main branch
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  # CONTAINERIZATION - Build Docker Images via Compose
  build-containers:
    name: Build Docker Containers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      
      - name: Build Docker Images
        run: |
          docker build -t pr-test/backend:latest -f ./finance_tracker.backend/finance_tracker.backend/Dockerfile ./finance_tracker.backend/finance_tracker.backend
          docker build -t pr-test/frontend:latest -f ./finance_tracker.frontend/Dockerfile ./finance_tracker.frontend
      
      - name: Save Docker Images
        run: |
          docker save pr-test/backend:latest | gzip > backend-image.tar.gz
          docker save pr-test/frontend:latest | gzip > frontend-image.tar.gz
      
      - name: Upload Container Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: app-containers
          path: |
            backend-image.tar.gz
            frontend-image.tar.gz

  # CONTAINER SECURITY SCANNING - Trivy
  # Depends on: build-containers (needs images to scan)
  container-security-scan:
    name: Container Security - Trivy
    runs-on: ubuntu-latest
    needs: build-containers
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      
      - name: Download Container Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: app-containers
      
      - name: Load Docker Images
        run: |
          docker load < backend-image.tar.gz
          docker load < frontend-image.tar.gz
      
      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'pr-test/backend:latest'
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
      
      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'pr-test/frontend:latest'
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'
      
      - name: Upload Backend Trivy Results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-backend-results.sarif'
          category: 'trivy-backend'
      
      - name: Upload Frontend Trivy Results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-frontend-results.sarif'
          category: 'trivy-frontend'
      
      - name: Upload Trivy Reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: trivy-container-reports
          path: |
            trivy-backend-results.sarif
            trivy-frontend-results.sarif

  # DYNAMIC APPLICATION SECURITY TESTING - OWASP ZAP
  # Depends on: build-containers (needs running app to test)
  dast-owasp-zap:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: build-containers
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      
      - name: Download Container Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: app-containers
      
      - name: Load Docker Images
        run: |
          docker load < backend-image.tar.gz
          docker load < frontend-image.tar.gz
      
      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
      
      - name: Start Application
        env:
          DOCKER_REGISTRY_SERVER_URL: pr-test
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          SQL_SERVER=$(az sql server list -g "${{ secrets.RESOURCE_GROUP_NAME }}" --query "[0].name" -o tsv)
          echo "SQL_SERVER=$SQL_SERVER" >> $GITHUB_ENV
          az sql server firewall-rule create -g "${{ secrets.RESOURCE_GROUP_NAME }}" -s "$SQL_SERVER" -n "Runner-${{ github.run_id }}-${{ github.job }}" --start-ip-address $RUNNER_IP --end-ip-address $RUNNER_IP
          docker compose -f docker-compose.prod.yml up -d
      
      - name: Wait for Backend Health Check
        run: |
          echo "Waiting for backend to be ready..."
          timeout 60 bash -c 'until curl -s -o /dev/null -w "%{http_code}" http://localhost/api/health | grep -q "200"; do sleep 2; done'
          echo "Backend is ready!"
      
      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: 'http://localhost'
          cmd_options: '-a'
      
      - name: Upload ZAP Results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: zap-scan-results
          path: report_html.html
      
      - name: Stop Application
        if: always()
        run: |
          az sql server firewall-rule delete -g "${{ secrets.RESOURCE_GROUP_NAME }}" -s "$SQL_SERVER" -n "Runner-${{ github.run_id }}-${{ github.job }}"
          docker compose -f docker-compose.prod.yml down

  # INTEGRATION TESTS - Containerized Backend
  # Depends on: build-containers (needs running app to test)
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-containers
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: '10.x'
      
      - name: Download Container Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: app-containers
      
      - name: Load Docker Images
        run: |
          docker load < backend-image.tar.gz
          docker load < frontend-image.tar.gz
      
      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
      
      - name: Start Application
        env:
          DOCKER_REGISTRY_SERVER_URL: pr-test
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          SQL_SERVER=$(az sql server list -g "${{ secrets.RESOURCE_GROUP_NAME }}" --query "[0].name" -o tsv)
          echo "SQL_SERVER=$SQL_SERVER" >> $GITHUB_ENV
          az sql server firewall-rule create -g "${{ secrets.RESOURCE_GROUP_NAME }}" -s "$SQL_SERVER" -n "Runner-${{ github.run_id }}-${{ github.job }}" --start-ip-address $RUNNER_IP --end-ip-address $RUNNER_IP
          docker compose -f docker-compose.prod.yml up -d
      
      - name: Wait for Backend Health Check
        run: |
          echo "Waiting for backend to be ready..."
          timeout 60 bash -c 'until curl -s -o /dev/null -w "%{http_code}" http://localhost/api/health | grep -q "200"; do sleep 2; done'
          echo "Backend is ready!"
      
      - name: Run Integration Tests
        working-directory: ./finance_tracker.backend/finance_tracker.backend.Tests
        run: dotnet test --filter "Category=Integration"
      
      - name: Stop Application
        if: always()
        run: |
          az sql server firewall-rule delete -g "${{ secrets.RESOURCE_GROUP_NAME }}" -s "$SQL_SERVER" -n "Runner-${{ github.run_id }}-${{ github.job }}"
          docker compose -f docker-compose.prod.yml down

  # E2E TESTS - Cypress
  # Depends on: build-containers (needs running app to test)
  e2e-tests:
    name: E2E Tests - Cypress
    runs-on: ubuntu-latest
    needs: build-containers
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24.x'
      
      - name: Download Container Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: app-containers
      
      - name: Load Docker Images
        run: |
          docker load < backend-image.tar.gz
          docker load < frontend-image.tar.gz
      
      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
      
      - name: Start Application
        env:
          DOCKER_REGISTRY_SERVER_URL: pr-test
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          SQL_SERVER=$(az sql server list -g "${{ secrets.RESOURCE_GROUP_NAME }}" --query "[0].name" -o tsv)
          echo "SQL_SERVER=$SQL_SERVER" >> $GITHUB_ENV
          az sql server firewall-rule create -g "${{ secrets.RESOURCE_GROUP_NAME }}" -s "$SQL_SERVER" -n "Runner-${{ github.run_id }}-${{ github.job }}" --start-ip-address $RUNNER_IP --end-ip-address $RUNNER_IP
          docker compose -f docker-compose.prod.yml up -d
      
      - name: Wait for Frontend
        run: |
          echo "Waiting for frontend to be ready..."
          timeout 60 bash -c 'until curl -s -o /dev/null -w "%{http_code}" http://localhost | grep -q "200"; do sleep 2; done'
          echo "Frontend is ready!"
      
      - name: Install Cypress Dependencies
        working-directory: ./finance_tracker.frontend
        run: npm ci
      
      - name: Run Cypress Tests
        working-directory: ./finance_tracker.frontend
        run: echo "Cypress e2e tests placeholder"
      
      - name: Stop Application
        if: always()
        run: |
          az sql server firewall-rule delete -g "${{ secrets.RESOURCE_GROUP_NAME }}" -s "$SQL_SERVER" -n "Runner-${{ github.run_id }}-${{ github.job }}"
          docker compose -f docker-compose.prod.yml down

  # PREVIEW CHANGES - Infrastructure & Database
  preview-changes:
    name: Preview Changes - Infrastructure & Database
    runs-on: ubuntu-latest
  
    permissions:
      pull-requests: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: '10.x'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: 1.14.0
          terraform_wrapper: false
      
      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
      
      - name: Generate EF Migration Bundle
        working-directory: ./finance_tracker.backend/finance_tracker.backend
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.DB_CONNECTION_STRING }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
        run: |
          dotnet tool install --global dotnet-ef
          dotnet restore
          dotnet ef migrations bundle --output /tmp/migrations.exe --self-contained -r linux-x64
      
      - name: Terraform Format Check
        working-directory: ./terraform
        run: terraform fmt -check
      
      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_sql_admin_password: ${{ secrets.SQL_ADMIN_PASSWORD }}
      
      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./terraform
        run: |
          terraform plan -input=false -out=tfplan -no-color > /tmp/terraform-plan.txt 2>&1
          cat /tmp/terraform-plan.txt
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_sql_admin_password: ${{ secrets.SQL_ADMIN_PASSWORD }}
      
      - name: Comment PR with Terraform Plan
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('/tmp/terraform-plan.txt', 'utf8');
            const body = `## Terraform Plan\n\`\`\`diff\n${plan}\n\`\`\``;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body
            });
      
      - name: Upload Terraform Plan
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: terraform-plan
          path: terraform/tfplan