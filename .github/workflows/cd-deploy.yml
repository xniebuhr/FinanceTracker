name: CD - Deploy to Production

# Runs when changes are merged to main
on:
  push:
    branches: [main]

jobs:
  # DEPLOY INFRASTRUCTURE - Terraform Apply
  deploy-infrastructure:
    name: Deploy Infrastructure - Terraform
    runs-on: ubuntu-latest
    environment: ${{ (github.actor == 'renovate[bot]') && 'Production-Auto' || 'Production' }}
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: 1.14.0
      
      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_sql_admin_password: ${{ secrets.SQL_ADMIN_PASSWORD }}
      
      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_sql_admin_password: ${{ secrets.SQL_ADMIN_PASSWORD }}

  # DEPLOY DATABASE - EF Migrations
  deploy-database:
    name: Deploy Database - EF Migrations
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: '10.x'
           
      - name: Login to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
      
      - name: Whitelist Runner IP for Database
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          SQL_SERVER_NAME=$(az sql server list -g "${{ secrets.RESOURCE_GROUP_NAME }}" --query "[0].name" -o tsv)
          echo "SQL_SERVER_NAME=$SQL_SERVER_NAME" >> $GITHUB_ENV
          az sql server firewall-rule create -g "${{ secrets.RESOURCE_GROUP_NAME }}" -s "$SQL_SERVER_NAME" -n "GitHubRunner" --start-ip-address $RUNNER_IP --end-ip-address $RUNNER_IP

          echo "Waiting 30 seconds for Azure SQL to wake up..."
          sleep 30
      
      - name: Run EF Migrations
        working-directory: ./finance_tracker.backend/finance_tracker.backend
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.DB_CONNECTION_STRING }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
        run: |
          dotnet tool install --global dotnet-ef
          dotnet restore
          dotnet ef migrations bundle --output ./migrate.exe --self-contained -r linux-x64
          chmod +x ./migrate.exe
          ./migrate.exe --connection "${{ secrets.DB_CONNECTION_STRING }}"
          
      - name: Remove Database Firewall Rule
        if: always()
        run: az sql server firewall-rule delete -g "${{ secrets.RESOURCE_GROUP_NAME }}" -s "$SQL_SERVER_NAME" -n "GitHubRunner"

  # BUILD & PUSH CONTAINER - Docker to Azure Container Registry
  build-and-push-container:
    name: Build & Push Container - ACR
    runs-on: ubuntu-latest
    needs: deploy-database
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Login to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
      
      - name: Get ACR Login Server
        id: get-acr
        run: |
          ACR_SERVER=$(az acr list -g "${{ secrets.RESOURCE_GROUP_NAME }}" --query "[0].loginServer" -o tsv)
          echo "ACR_SERVER=$ACR_SERVER" >> $GITHUB_ENV

      - name: Login to Azure Container Registry
        uses: azure/docker-login@15c4aadf093404726ab2ff205b2cdd33fa6d054c # v2
        with: 
          login-server: ${{ env.ACR_SERVER }}
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}
      
      - name: Build & Tag Images
        run: |
          # Backend
          docker build -t ${{ env.ACR_SERVER }}/backend:${{ github.sha }} -f ./finance_tracker.backend/finance_tracker.backend/Dockerfile ./finance_tracker.backend/finance_tracker.backend
          docker tag ${{ env.ACR_SERVER }}/backend:${{ github.sha }} ${{ env.ACR_SERVER }}/backend:latest
          
          # Frontend
          docker build -t ${{ env.ACR_SERVER }}/frontend:${{ github.sha }} -f ./finance_tracker.frontend/Dockerfile ./finance_tracker.frontend
          docker tag ${{ env.ACR_SERVER }}/frontend:${{ github.sha }} ${{ env.ACR_SERVER }}/frontend:latest

      - name: Security Scan - Backend
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # master
        with:
          image-ref: '${{ env.ACR_SERVER }}/backend:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Security Scan - Frontend
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # master
        with:
          image-ref: '${{ env.ACR_SERVER }}/frontend:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
      
      - name: Push to Azure Container Registry
        run: |
          docker push ${{ env.ACR_SERVER }}/backend:latest
          docker push ${{ env.ACR_SERVER }}/frontend:latest

  # DEPLOY STAGING - Azure App Service
  deploy-staging:
    name: Deploy to Staging & Smoke Test
    runs-on: ubuntu-latest
    needs: build-and-push-container
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Login to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Get Staging App name
        id: get-staging
        run: |
          STAGING_APP=$(az webapp list -g "${{ secrets.RESOURCE_GROUP_NAME }}" --query "[?contains(name, 'staging-app-finance-tracker')].name" -o tsv)
          echo "STAGING_URL=https://$STAGING_APP.azurewebsites.net" >> $GITHUB_ENV
          echo "STAGING_APP=$STAGING_APP" >> $GITHUB_ENV

      - name: Deploy Compose to Staging
        run: |
          # Fetch ACR server name
          ACR_SERVER=$(az acr list -g "${{ secrets.RESOURCE_GROUP_NAME }}" --query "[0].loginServer" -o tsv)
          export DOCKER_REGISTRY_SERVER_URL=$ACR_SERVER
          echo "Using Registry: $DOCKER_REGISTRY_SERVER_URL"

          # Inject it into the compose file
          envsubst '$DOCKER_REGISTRY_SERVER_URL' < docker-compose.prod.yml > deploy-compose.yml

          # Push to Azure
          az webapp config container set \
            --name "$STAGING_APP" \
            --resource-group "${{ secrets.RESOURCE_GROUP_NAME }}" \
            --multicontainer-config-type COMPOSE \
            --multicontainer-config-file deploy-compose.yml

          # 4. Force restart to fix cold start block
          echo "Restarting App Service to apply new configuration..."
          az webapp restart --name "$STAGING_APP" --resource-group "${{ secrets.RESOURCE_GROUP_NAME }}"

      - name: Inject Application Secrets
        run: |
          az webapp config appsettings set \
            -g "${{ secrets.RESOURCE_GROUP_NAME }}" \
            -n "$STAGING_APP" \
            --settings \
            DB_CONNECTION_STRING="${{ secrets.DB_CONNECTION_STRING }}" \
            JWT_KEY="${{ secrets.JWT_KEY }}"
      
      - name: Whitelist Runner IP on Staging App
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          
          az webapp config access-restriction add \
            -g "${{ secrets.RESOURCE_GROUP_NAME }}" \
            -n "$STAGING_APP" \
            --rule-name "GitHubRunner" \
            --action Allow \
            --ip-address "$RUNNER_IP/32" \
            --priority 101

      - name: Wait for Staging Deployment
        run: |
          echo "Waiting for app to wake up at $STAGING_URL/api/health..."
          for i in {1..30}; do
            STATUS=$(curl -s -m 10 -o /dev/null -w "%{http_code}" "$STAGING_URL/api/health" || echo "000")
            
            if [ "$STATUS" = "200" ]; then
              echo "App is up and healthy! (Status: $STATUS)"
              exit 0
            fi
            
            echo "Attempt $i/30: Status was $STATUS. Waiting 10 seconds..."
            sleep 10
          done
          
          echo "Timed out waiting for staging deployment"
          exit 1

      - name: Smoke Tests on Staging
        run: |
          echo "Running smoke tests against staging..."

          run_test() {
            local test_name=$1
            local target_url=$2
            local expected_status=$3
            local max_attempts=5
            local attempt=1

            echo "Testing $test_name..."

            while [ $attempt -le $max_attempts ]; do
              # Hit the URL and grab the HTTP status code
              STATUS=$(curl -s -m 10 -o /dev/null -w "%{http_code}" "$target_url")
              
              if [ "$STATUS" = "$expected_status" ]; then
                echo "$test_name passed! (Status: $STATUS)"
                return 0
              fi
              
              echo "Attempt $attempt/$max_attempts: Status was $STATUS (Expected: $expected_status). Retrying in 5s..."
              sleep 5
              ((attempt++))
            done

            echo "$test_name failed after $max_attempts attempts. Final status: $STATUS"
            return 1
          }

          # Run all tests
          run_test "Frontend" "$STAGING_URL/" "200" || exit 1
          run_test "API Routing" "$STAGING_URL/api/auth/login" "405" || exit 1
          run_test "DB Connectivity" "$STAGING_URL/api/health/db" "200" || exit 1

      - name: Remove Runner IP Whitelist
        if: always()
        run: |
          az webapp config access-restriction remove \
            -g "${{ secrets.RESOURCE_GROUP_NAME }}" \
            -n "$STAGING_APP" \
            --rule-name "GitHubRunner"

  # DEPLOY APPLICATION - Azure App Service
  deploy-application:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      
      - name: Login to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Get Prod App Name
        id: get-prod  
        run: |
          PROD_APP=$(az webapp list -g "${{ secrets.RESOURCE_GROUP_NAME }}" --query "[?contains(name, 'app-finance-tracker') && !contains(name, 'staging')].name" -o tsv)
          echo "PROD_APP=$PROD_APP" >> $GITHUB_ENV

      - name: Deploy Compose to Production
        run: |
          # Fetch ACR server name
          ACR_SERVER=$(az acr list -g "${{ secrets.RESOURCE_GROUP_NAME }}" --query "[0].loginServer" -o tsv)
          export DOCKER_REGISTRY_SERVER_URL=$ACR_SERVER
          echo "Using Registry: $DOCKER_REGISTRY_SERVER_URL"

          # Inject it into the compose file
          envsubst '$DOCKER_REGISTRY_SERVER_URL' < docker-compose.prod.yml > deploy-compose.yml

          # Push to Azure (Targeting Production)
          az webapp config container set \
            --name "$PROD_APP" \
            --resource-group "${{ secrets.RESOURCE_GROUP_NAME }}" \
            --multicontainer-config-type COMPOSE \
            --multicontainer-config-file deploy-compose.yml

          # Force restart to apply new configuration
          echo "Restarting Production App Service..."
          az webapp restart --name "$PROD_APP" --resource-group "${{ secrets.RESOURCE_GROUP_NAME }}"

      - name: Inject Application Secrets
        run: |
          az webapp config appsettings set \
            -g "${{ secrets.RESOURCE_GROUP_NAME }}" \
            -n "$PROD_APP" \
            --settings \
            DB_CONNECTION_STRING="${{ secrets.DB_CONNECTION_STRING }}" \
            JWT_KEY="${{ secrets.JWT_KEY }}"