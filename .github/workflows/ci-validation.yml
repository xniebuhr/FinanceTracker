name: CI - Validation

# Runs on every push to any branch
on:
  push:
    branches-ignore: ["main"]
  workflow_call:  # Allows PR workflow to reuse this

jobs:
  # SECRET SCANNING - Trufflehog
  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # Full history

      - name: Run Trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  # CODE QUALITY - Backend Unit Tests
  backend-tests:
    name: Backend Tests (.NET)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: '10.x'
      
      - name: Restore Dependencies
        working-directory: ./finance_tracker.backend
        run: dotnet restore
      
      - name: Run xUnit Tests
        working-directory: ./finance_tracker.backend
        # PLACEHOLDER: dotnet test with coverage
        run: echo "xUnit tests placeholder"

  # CODE QUALITY - Frontend Unit Tests
  frontend-tests:
   name: Frontend Tests (Angular)
   runs-on: ubuntu-latest
   steps:
     - name: Checkout code
       uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
     
     - name: Setup Node.js
       uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
       with:
         node-version: '24.x'
     
     - name: Install Dependencies
       working-directory: ./finance_tracker.frontend
       run: npm ci
     
     - name: Run Karma Tests
       working-directory: ./finance_tracker.frontend
       # PLACEHOLDER: ng test with coverage
       run: echo "Karma tests placeholder"

  # STATIC APPLICATION SECURITY TESTING - CodeQL
  sast-codeql:
    name: SAST - CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp, javascript
      
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: '10.x'
      
      - name: Build Backend
        working-directory: ./finance_tracker.backend
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  # FORMATTING - Backend Code Style Checks
  lint-backend:
    name: Format - .NET
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: '10.x'
      
      - name: Check Code Formatting
        working-directory: ./finance_tracker.backend
        run: dotnet format --verify-no-changes --verbosity diagnostic

  # FORMATTING - Frontend Code Style Checks
  lint-frontend:
   name: Format - Angular
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
     - name: Check Prettier
       run: npx prettier --check "finance_tracker.frontend/src/**/*.{ts,html,scss}"

  # LINTING - Global lint checker
  # This doesn't check angular bc every available ts linter fails for different reasons :(
  # The angular check will just be handled by a build to catch errors
  global-lint:
    name: Global Lint (Super-Linter)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 
      - name: Lint Code Base
        uses: super-linter/super-linter@v8
        env:
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_CSHARP: true              # .NET check
          VALIDATE_TERRAFORM: true           # Terraform check
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # LINTING - Build frontend
  # This is the replacement for frontend linting bc the global linter doesn't work and I don't wanna get another one
  build-frontend:
    name: Build - Angular
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with: 
          node-version: '24.x'
      
      - name: Install & Build
        working-directory: ./finance_tracker.frontend
        run: |
          npm ci
          npm run build

  # DEPENDENCY SCANNING - GitHub Dependabot
  dependency-check:
    name: Dependency Scanning - Dependabot Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      
      - name: Check for Dependabot Alerts (.NET)
        working-directory: ./finance_tracker.backend
        if: github.actor != 'renovate[bot]'
        run: dotnet list package --vulnerable --include-transitive

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'

      - name: Install Dependencies (Angular)
        working-directory: ./finance_tracker.frontend
        run: npm ci

      - name: Check for Dependabot Alerts (Angular)
        working-directory: ./finance_tracker.frontend
        if: github.actor != 'renovate[bot]'
        run: npm audit  

  # INFRASTRUCTURE SECURITY SCANNING - Trivy on Terraform
  terraform-security-scan:
    name: Infrastructure Security - Trivy (Terraform)
    runs-on: ubuntu-latest
    permissions: 
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      
      - name: Run Trivy Config Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: './terraform'
          format: 'sarif'
          output: 'trivy-terraform-results.sarif'
      
      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-terraform-results.sarif'
      
      - name: Upload Trivy Report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: trivy-terraform-report
          path: trivy-terraform-results.sarif
