<header class="header">
  <div class="header__inner">
    <a routerLink="/" class="brand" aria-label="Finance Tracker home">
      <span class="brand__mark" aria-hidden="true"></span>
      <span class="brand__text">Finance Tracker</span>
    </a>

    <nav class="nav-actions" aria-label="Quick actions">
      <button type="button" class="btn btn--ghost">Add transaction</button>
      <button type="button" class="btn btn--ghost">Update transaction</button>
      <button type="button" class="btn btn--ghost btn--placeholder">Visualize</button>
    </nav>

    <div class="header__auth">
      @if (!shell.isLoggedIn()) {
        <button type="button" class="btn btn--signup">Sign up</button>
        <button type="button" class="btn btn--login">Log in</button>
      } @else {
        <details class="profile">
          <summary class="profile__trigger" aria-label="Account menu">
            <span class="avatar" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.574-7.499-1.632z"
                />
              </svg>
            </span>
          </summary>
          <div class="profile__panel" role="menu">
            <button type="button" class="profile__item" role="menuitem">Profile</button>
          </div>
        </details>
      }
    </div>
  </div>
</header>
