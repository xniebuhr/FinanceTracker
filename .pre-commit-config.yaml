repos:
  # .NET Code Formatting
  - repo: local
    hooks:
      - id: dotnet-format
        name: .NET Code Format
        entry: bash -c 'cd finance_tracker.backend && dotnet format'
        language: system
        pass_filenames: false
  
  # Angular Code Formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: Frontend Format
        files: ^finance_tracker.frontend/src/.*\.(ts|html|scss|json)$ 
        args: ["--write"]

  # Terraform Formatting
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.104.0
    hooks:
      - id: terraform_fmt
        name: Terraform Format
        files: \.tf$