repos:
  # .NET Code Formatting
  - repo: local
    hooks:
      - id: dotnet-format
        name: .NET Code Format
        entry: dotnet format finance_tracker.backend
        language: system
        pass_filenames: false
  
  # Angular Code Formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: Frontend Format
        files: ^finance_tracker.frontend/src/.*\.(ts|html|scss|json)$ 
        args: ["--write"]

  # Terraform Formatting
  - repo: local
    hooks:
      - id: terraform_fmt
        name: Terraform Format
        entry: terraform fmt -recursive terraform/
        language: system
        pass_filenames: false
        files: \.tf$